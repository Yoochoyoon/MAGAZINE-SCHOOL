<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 최애 게임 매거진</title>
    <style>
        /* 1. 기본 설정 및 테마 변수 */
        :root {
            --bg-color: #f4f4f0;
            --text-color: #222;
            --point-color: #e11d48;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            background-image: url(bg1.png); 
            background-size: cover;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* =========================================
           [실습 1] CSS Grid 메인 레이아웃 만들기
           ========================================= */


        .magazine-layout {
            max-width: 1200px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            padding: 20px;
            display: grid;
            background-color: #e2d4be9f;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            /* TODO 1: 여기를 Grid로 만들고, 가로를 3등분(1fr 2fr 1fr) 하세요. 간격은 20px! */
        }
        header {
            /* TODO 2: 헤더가 첫 칸부터 끝 칸까지 전체 너비를 차지하게 하세요. */
            grid-column: 1/-1;
            text-align: center;
            border-bottom: 4px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        

        header h1 {
            font-size: 3rem;
            font-weight: 900;
        }

        aside {
            padding: 10px;
        }

        main {
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 0 20px;
        }

        /* =========================================
           [실습 2] 내부 기사 카드 Grid 배열
           ========================================= */
        .article-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            /* TODO 3: 메인 영역 내부 기사들도 Grid로 만드세요 (1fr 1fr 2단 구성, 간격 15px) */

        }

        /* 기사 카드 스타일 및 Transition (마우스 오버 효과) */
        .magic-card {
            border-bottom: 1px solid #ccc;
            padding-bottom: 15px;
            overflow: hidden;
            transition: transform 0.5s ease;
            /* TODO 4: 마우스를 올렸을 때 부드럽게 위로 살짝 떠오르도록 Transition과 transform을 추가해보세요. */

        }

        .magic-card:hover {
            transform: translateY(-10px);
        }

        .magic-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        /* =========================================
           [실습 3] @keyframes 애니메이션 만들기
           ========================================= */
        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: var(--border-color);
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            animation: slide-left 10s linear infinite;
            /* TODO 5: 아래 만든 slide-left 애니메이션을 10초 동안 무한 반복(infinite) 선형(linear)으로 적용하세요. */

        }

        /* 텍스트가 흘러가는 애니메이션 */
        @keyframes slide-left {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        /* NEW 뱃지 깜빡임 애니메이션 */
        .badge-new {
            display: inline-block;
            background: var(--point-color);
            color: white;
            padding: 2px 8px;
            font-size: 0.8rem;
            border-radius: 12px;
            margin-bottom: 10px;
            /* TODO 6: 여기에 직접 새로운 @keyframes를 만들어 적용해보세요! (예: 둥둥 뜨기, 깜빡이기) */
            animation: blink 2s infinite;

        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 반응형 모바일 설정 */
        @media (max-width: 800px) {
            .magazine-layout {
                grid-template-columns: 1fr;
            }

            header {
                grid-column: 1;
            }

            main {
                border: none;
                padding: 0;
                margin: 20px 0;
            }
            

            .article-grid {
                grid-template-columns: 1fr;
            }
        }
        img{
            width: 100%;
            object-fit: cover;
        }

    </style>
</head>

<body>

    <div class="magazine-layout">
        <header>
            <h1>Mabinogi Mobaile</h1>
            <p>Vol. 1 | 2026. 04. 24 | 오늘의 에린 소식</p>
        </header>

        <!-- 흘러가는 속보 -->
        <div class="ticker-wrap" style="grid-column: 1 / -1;">
            <div class="ticker-move">🔥 [긴급] 함께 모험을 떠날 분은 [헛소리공작단] 길드로 연락주세요. 🔥</div>
        </div>

        <aside>
            <h2 style="border-bottom: 2px solid var(--point-color); margin-bottom: 15px;">Director</h2>
            <div style="background: #fff; padding: 15px; border: 1px solid #ddd;">
                <h4>나크</h4>
                <p style="font-size: 0.9rem; color: #666;">게임이 너무 쉬우면 재미없습니다.</p>
            </div>
        </aside>

        <main>
            <div class="article-grid">
                <!-- 기사 카드 1 -->
                <article class="magic-card">
                    <span class="badge-new">NEW</span>
                    <img src="img1.png" alt="기사 썸네일">
                    <h3 style="font-size: 1.1rem; margin: 10px 0;">신규 클래스 [기사]</h3>
                    <p style="font-size: 0.9rem; color: #555;">전사 계열의 신규 전직 클래스 '기사'가 추가되며, 견습 전사에서 전직 시 '기사'를 선택할 수 있습니다.</p>
                </article>

                <!-- 기사 카드 2 -->
                <article class="magic-card">
                    <span class="badge-new" style="background:#3b82f6;">HOT</span>
                    <img src="img2.jpg" alt="기사 썸네일">
                    <h3 style="font-size: 1.1rem; margin: 10px 0;">마비노기 모바일이 1주년을 맞이했습니다.</h3>
                    <p style="font-size: 0.9rem; color: #555;">'마비노기 모바일'의 서비스 1주년을 맞아 대규모 업데이트와 이벤트 중심의 신규 콘텐츠를 선보였습니다.</p>
                </article>
            </div>
        </main>

        <aside>
            <h2 style="border-bottom: 2px solid var(--point-color); margin-bottom: 15px;">Ad</h2>
            <div
                style="background: #333; color: #fff; width: 100%; align-items: center; justify-content: center; text-align: center;">
                <img src="img3.jpg" alt="기사 썸네일">
            </div>
        </aside>
    </div>

</body>

</html>
